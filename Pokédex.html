<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex Elite V2</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        kanit: ['Kanit', 'sans-serif'],
                        montserrat: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        * { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        body { font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        .pokedex-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
        }
        @media (min-width: 1024px) {
            .pokedex-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 24px; }
        }

        .pokemon-card { position: relative; z-index: 1; overflow: hidden; }
        .pokemon-card:hover { transform: translateY(-8px) scale(1.02); }
        
        .type-glow { position: absolute; top: -20%; right: -20%; width: 80%; height: 80%; filter: blur(40px); opacity: 0.15; z-index: -1; }

        .modal-overlay { backdrop-filter: blur(20px); z-index: 100; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .hide-scroll::-webkit-scrollbar { display: none; }
        .stat-bar { height: 8px; border-radius: 10px; background: #e2e8f0; overflow: hidden; }
        .stat-fill { height: 100%; border-radius: 10px; }
        
        .tag-rare { font-size: 8px; font-weight: 800; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }
        .legendary { background: #facc15; color: #000; }
        .mythical { background: #a855f7; color: #fff; }
        .var-badge { font-size: 7px; font-weight: 900; padding: 2px 4px; border-radius: 4px; position: absolute; top: 6px; right: 6px; z-index: 10; }
        
        .skeleton { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: skeletonLoad 1.5s infinite; }
        @keyframes skeletonLoad { from { background-position: 200% 0; } to { background-position: -200% 0; } }
    </style>
</head>
<body class="bg-slate-100 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Dicionarios de Traducao
        const TRANSLATIONS = {
            types: {
                fire: 'Fogo', water: 'Agua', grass: 'Planta', bug: 'Inseto', normal: 'Normal', 
                poison: 'Venenoso', electric: 'Eletrico', ground: 'Terra', fairy: 'Fada', 
                fighting: 'Lutador', psychic: 'Psiquico', rock: 'Pedra', ghost: 'Fantasma', 
                ice: 'Gelo', dragon: 'Dragao', steel: 'Aco', flying: 'Voador', dark: 'Sombrio'
            },
            stats: {
                hp: 'Vida', attack: 'Ataque', defense: 'Defesa', 
                'special-attack': 'Atk Esp', 'special-defense': 'Def Esp', speed: 'Veloc'
            },
            habitats: {
                cave: 'Caverna', forest: 'Floresta', grassland: 'Gramado', mountain: 'Montanha',
                rare: 'Raro', 'rough-terrain': 'Terreno Acidentado', sea: 'Mar', urban: 'Urbano',
                waters_edge: 'Beira da Agua', unknown: 'Desconhecido'
            }
        };

        const COLORS = {
            fire: 'bg-red-500', water: 'bg-blue-500', grass: 'bg-green-500', bug: 'bg-lime-600', 
            normal: 'bg-slate-400', poison: 'bg-purple-500', electric: 'bg-yellow-400', ground: 'bg-amber-600', 
            fairy: 'bg-pink-400', fighting: 'bg-orange-700', psychic: 'bg-rose-400', rock: 'bg-stone-600', 
            ghost: 'bg-indigo-800', ice: 'bg-cyan-300', dragon: 'bg-violet-600', steel: 'bg-gray-500', 
            flying: 'bg-sky-400', dark: 'bg-slate-900'
        };

        const GENERATIONS = {
            'gen1': { name: 'Kanto (G1)', range: [1, 151] },
            'gen2': { name: 'Johto (G2)', range: [152, 251] },
            'gen3': { name: 'Hoenn (G3)', range: [252, 386] },
            'gen4': { name: 'Sinnoh (G4)', range: [387, 493] },
            'gen5': { name: 'Unova (G5)', range: [494, 649] },
            'gen6': { name: 'Kalos (G6)', range: [650, 721] },
            'gen7': { name: 'Alola (G7)', range: [722, 809] },
            'gen8': { name: 'Galar (G8)', range: [810, 905] },
            'gen9': { name: 'Paldea (G9)', range: [906, 1025] }
        };

        function App() {
            const [theme, setTheme] = useState('light');
            const [pokemonList, setPokemonList] = useState([]);
            const [fullLoading, setFullLoading] = useState(true);
            const [search, setSearch] = useState('');
            const [typeF, setTypeF] = useState('todos');
            const [genF, setGenF] = useState('todos');
            const [rareF, setRareF] = useState('todos');
            const [selected, setSelected] = useState(null);
            const [evoChain, setEvoChain] = useState([]);

            useEffect(() => { document.documentElement.className = theme; }, [theme]);

            useEffect(() => {
                const init = async () => {
                    const res = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1025');
                    const data = await res.json();
                    const list = data.results.map((p, i) => ({
                        name: p.name,
                        id: i + 1,
                        img: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${i + 1}.png`
                    }));
                    setPokemonList(list);
                    setFullLoading(false);
                    loadBackgroundMetadata(list);
                };
                init();
            }, []);

            const loadBackgroundMetadata = async (list) => {
                const batchSize = 40;
                for (let i = 0; i < list.length; i += batchSize) {
                    const batch = list.slice(i, i + batchSize);
                    const details = await Promise.all(batch.map(async p => {
                        try {
                            const r = await fetch(`https://pokeapi.co/api/v2/pokemon/${p.id}`);
                            const d = await r.json();
                            const sr = await fetch(d.species.url);
                            const sd = await sr.json();
                            return { 
                                ...p, 
                                types: d.types.map(t => t.type.name),
                                rarity: sd.is_mythical ? 'mitico' : sd.is_legendary ? 'lendario' : 'comum'
                            };
                        } catch { return p; }
                    }));
                    setPokemonList(prev => {
                        const copy = [...prev];
                        details.forEach(d => {
                            const idx = copy.findIndex(item => item.id === d.id);
                            if (idx !== -1) copy[idx] = d;
                        });
                        return copy;
                    });
                }
            };

            const loadDetails = async (idOrName) => {
                const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${idOrName}`);
                const data = await res.json();
                const sRes = await fetch(data.species.url);
                const sData = await sRes.json();
                const eRes = await fetch(sData.evolution_chain.url);
                const eData = await eRes.json();

                let desc = sData.flavor_text_entries.find(e => e.language.name === 'pt-br' || e.language.name === 'pt')?.flavor_text;
                if (!desc) desc = sData.flavor_text_entries.find(e => e.language.name === 'es')?.flavor_text;
                if (!desc) desc = sData.flavor_text_entries.find(e => e.language.name === 'en')?.flavor_text;

                let chain = [];
                let curr = eData.chain;
                while (curr) {
                    const name = curr.species.name;
                    const spRes = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${name}`);
                    const spData = await spRes.json();
                    const vars = await Promise.all(spData.varieties.map(async v => {
                        const vR = await fetch(v.pokemon.url);
                        const vD = await vR.json();
                        return { name: v.pokemon.name, id: vD.id, img: vD.sprites.other['official-artwork'].front_default || vD.sprites.front_default };
                    }));
                    chain.push({ name, variants: vars });
                    curr = curr.evolves_to[0];
                }
                setEvoChain(chain);
                setSelected({
                    ...data,
                    rarity: sData.is_mythical ? 'mitico' : sData.is_legendary ? 'lendario' : 'comum',
                    desc: desc ? desc.replace(/[\n\f]/g, ' ') : 'Descricao nao disponivel em Portugues.',
                    habitat: TRANSLATIONS.habitats[sData.habitat?.name] || 'Desconhecido'
                });
            };

            const filtered = useMemo(() => {
                return pokemonList.filter(p => {
                    const mSearch = p.name.includes(search.toLowerCase()) || p.id.toString() === search;
                    const mType = typeF === 'todos' || (p.types && p.types.includes(typeF));
                    const mRare = rareF === 'todos' || (p.rarity === rareF);
                    let mGen = true;
                    if (genF !== 'todos') {
                        const r = GENERATIONS[genF].range;
                        mGen = p.id >= r[0] && p.id <= r[1];
                    }
                    return mSearch && mType && mRare && mGen;
                });
            }, [search, typeF, genF, rareF, pokemonList]);

            return (
                <div className={`min-h-screen pb-10 ${theme === 'dark' ? 'bg-[#020617] text-white' : 'bg-slate-50 text-slate-900'}`}>
                    
                    <header className={`sticky top-0 z-[60] border-b backdrop-blur-xl ${theme === 'dark' ? 'bg-[#020617]/80 border-slate-800' : 'bg-white/80 border-slate-200'}`}>
                        <div className="max-w-[1800px] mx-auto p-4 md:p-6">
                            <div className="flex justify-between items-center mb-5">
                                <h1 className="text-xl md:text-2xl font-kanit font-bold tracking-tight uppercase">Pokedex<span className="text-red-600">Elite</span></h1>
                                <button 
                                    onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')}
                                    className={`px-4 py-2 rounded-2xl border text-[10px] font-bold tracking-widest ${theme === 'dark' ? 'bg-slate-900 border-slate-700 text-white' : 'bg-white border-slate-200 text-slate-700 shadow-sm'}`}
                                >
                                    {theme === 'dark' ? 'MODO CLARO' : 'MODO ESCURO'}
                                </button>
                            </div>
                            
                            <div className="grid grid-cols-2 md:flex flex-wrap gap-2 md:gap-3">
                                <input 
                                    type="text" 
                                    placeholder="Nome ou ID..."
                                    className={`col-span-2 md:flex-1 p-3.5 rounded-2xl text-sm outline-none border focus:ring-2 ring-red-500 transition-all ${theme === 'dark' ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-100 shadow-sm'}`}
                                    onChange={e => setSearch(e.target.value)}
                                />
                                <select className={`p-3 rounded-2xl text-[10px] font-bold border outline-none cursor-pointer ${theme === 'dark' ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-100'}`} onChange={e => setTypeF(e.target.value)}>
                                    <option value="todos">TIPOS</option>
                                    {Object.keys(TRANSLATIONS.types).map(k => <option key={k} value={k}>{TRANSLATIONS.types[k]}</option>)}
                                </select>
                                <select className={`p-3 rounded-2xl text-[10px] font-bold border outline-none cursor-pointer ${theme === 'dark' ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-100'}`} onChange={e => setGenF(e.target.value)}>
                                    <option value="todos">GERACOES</option>
                                    {Object.keys(GENERATIONS).map(k => <option key={k} value={k}>{GENERATIONS[k].name}</option>)}
                                </select>
                                <select className={`p-3 rounded-2xl text-[10px] font-bold border outline-none cursor-pointer text-red-600 ${theme === 'dark' ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-100'}`} onChange={e => setRareF(e.target.value)}>
                                    <option value="todos">RARIDADES</option>
                                    <option value="comum">COMUM</option>
                                    <option value="lendario">LENDARIO</option>
                                    <option value="mitico">MITICO</option>
                                </select>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-[1800px] mx-auto p-4 md:p-8">
                        <div className="pokedex-grid">
                            {fullLoading ? (
                                Array(15).fill(0).map((_, i) => (
                                    <div key={i} className="h-48 rounded-[35px] skeleton"></div>
                                ))
                            ) : filtered.map(p => (
                                <div 
                                    key={p.id} 
                                    onClick={() => loadDetails(p.id)} 
                                    className={`pokemon-card rounded-[35px] p-5 cursor-pointer border flex flex-col items-center group ${theme === 'dark' ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-100 shadow-md shadow-slate-200/40'}`}
                                >
                                    <div className={`type-glow ${p.types ? COLORS[p.types[0]] : 'bg-slate-400'}`}></div>
                                    <div className="w-full flex justify-between items-start">
                                        <span className="text-[11px] font-bold text-slate-400">#{p.id}</span>
                                        {p.rarity && p.rarity !== 'comum' && <span className={`tag-rare ${p.rarity === 'lendario' ? 'legendary' : 'mythical'}`}>{p.rarity}</span>}
                                    </div>
                                    <img src={p.img} className="w-28 h-28 md:w-36 md:h-36 object-contain drop-shadow-2xl z-10 group-hover:scale-110 transition-transform" />
                                    <h2 className={`text-sm md:text-base font-kanit font-bold capitalize mt-3 ${theme === 'dark' ? 'text-white' : 'text-slate-900'}`}>{p.name}</h2>
                                    <div className="flex flex-wrap justify-center gap-1.5 mt-4">
                                        {p.types?.map(t => <span key={t} className={`${COLORS[t]} px-2.5 py-1 rounded-lg text-[9px] font-bold uppercase text-white shadow-sm`}>{TRANSLATIONS.types[t]}</span>)}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {selected && (
                        <div className="fixed inset-0 modal-overlay flex items-end md:items-center justify-center p-0 md:p-6" onClick={() => setSelected(null)}>
                            <div className={`w-full max-w-6xl h-[92vh] md:h-auto max-h-[92vh] md:rounded-[48px] rounded-t-[40px] border shadow-2xl relative flex flex-col overflow-hidden ${theme === 'dark' ? 'bg-slate-950 border-slate-800 text-white' : 'bg-white border-slate-200 text-slate-900'}`} onClick={e => e.stopPropagation()}>
                                
                                {/* CABECALHO FIXO - NÃO SOME NO SCROLL */}
                                <div className={`flex-none p-5 border-b flex justify-between items-center z-[120] ${theme === 'dark' ? 'bg-slate-950 border-slate-800' : 'bg-white border-slate-200'}`}>
                                    <button 
                                        onClick={() => setSelected(null)} 
                                        className="bg-red-600 text-white px-6 py-2.5 rounded-2xl text-[10px] font-bold uppercase tracking-widest shadow-xl active:scale-95 transition-transform"
                                    >
                                        ← VOLTAR
                                    </button>
                                    <span className={`tag-rare ${selected.rarity === 'lendario' ? 'legendary' : selected.rarity === 'mitico' ? 'mythical' : 'bg-slate-100 text-slate-500 dark:bg-slate-900'}`}>{selected.rarity}</span>
                                </div>

                                {/* CONTEUDO COM SCROLL INDEPENDENTE */}
                                <div className="flex-1 overflow-y-auto p-6 md:p-12 hide-scroll">
                                    <div className="flex flex-col md:flex-row gap-12">
                                        <div className="w-full md:w-1/3 text-center">
                                            <div className={`rounded-[40px] p-8 mb-8 border relative group overflow-hidden ${theme === 'dark' ? 'bg-slate-900 border-slate-800' : 'bg-slate-50 border-slate-100'}`}>
                                                <div className={`absolute inset-0 opacity-10 blur-3xl ${COLORS[selected.types[0].type.name]}`}></div>
                                                <img src={selected.sprites.other['official-artwork'].front_default} className="w-52 h-52 md:w-full mx-auto relative z-10 drop-shadow-2xl" />
                                            </div>
                                            <h2 className="text-4xl font-kanit font-bold capitalize mb-4 tracking-tighter">{selected.name}</h2>
                                            <div className="flex justify-center gap-2 mb-8">
                                                {selected.types.map(t => <span key={t.type.name} className={`${COLORS[t.type.name]} px-5 py-2 rounded-xl text-xs font-bold uppercase text-white shadow-xl`}>{TRANSLATIONS.types[t.type.name]}</span>)}
                                            </div>
                                            <div className="flex justify-center gap-8 text-[11px] font-bold text-slate-400">
                                                <div className="text-center"><p>ALTURA</p><p className="text-lg text-red-600 font-bold">{selected.height / 10}m</p></div>
                                                <div className="w-px h-10 bg-slate-200 dark:bg-slate-800"></div>
                                                <div className="text-center"><p>PESO</p><p className="text-lg text-red-600 font-bold">{selected.weight / 10}kg</p></div>
                                            </div>
                                        </div>

                                        <div className="flex-1 space-y-12">
                                            <p className={`text-base italic leading-relaxed border-l-4 pl-4 ${theme === 'dark' ? 'text-slate-400 border-slate-700' : 'text-slate-600 border-slate-200'}`}>"{selected.desc}"</p>
                                            
                                            <section>
                                                <h3 className="text-red-600 font-kanit font-bold text-[11px] tracking-[0.3em] mb-6 uppercase">STATUS BASE</h3>
                                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-x-12 gap-y-6">
                                                    {selected.stats.map(s => (
                                                        <div key={s.stat.name}>
                                                            <div className="flex justify-between text-[11px] font-bold uppercase mb-2">
                                                                <span className="text-slate-500 font-medium">{TRANSLATIONS.stats[s.stat.name] || s.stat.name}</span>
                                                                <span className="font-bold">{s.base_stat}</span>
                                                            </div>
                                                            <div className="stat-bar bg-slate-100 dark:bg-slate-800">
                                                                <div className={`stat-fill ${COLORS[selected.types[0].type.name]}`} style={{width: `${(s.base_stat / 255) * 100}%`}}></div>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </section>

                                            <section>
                                                <h3 className="text-red-600 font-kanit font-bold text-[11px] tracking-[0.3em] mb-8 uppercase">EVOLUCOES E VARIANTES</h3>
                                                <div className="space-y-12">
                                                    {evoChain.map((step, i) => (
                                                        <div key={step.name} className="flex flex-col gap-6">
                                                            <div className="flex items-center gap-3">
                                                                <span className="text-[10px] font-bold text-slate-400 bg-slate-100 dark:bg-slate-900 px-3 py-1 rounded-lg">ESTAGIO {i + 1}</span>
                                                                <div className="h-px flex-1 bg-slate-100 dark:bg-slate-800"></div>
                                                            </div>
                                                            <div className="flex flex-wrap gap-4 justify-center md:justify-start">
                                                                {step.variants.map(v => {
                                                                    let badge = "";
                                                                    if(v.name.includes("-mega")) badge = "MEGA";
                                                                    if(v.name.includes("-gmax")) badge = "G-MAX";
                                                                    if(v.name.includes("-alola")) badge = "ALOLA";
                                                                    if(v.name.includes("-galar")) badge = "GALAR";
                                                                    if(v.name.includes("-hisui")) badge = "HISUI";
                                                                    if(v.name.includes("-paldea")) badge = "PALDEA";

                                                                    return (
                                                                        <div 
                                                                            key={v.id} 
                                                                            onClick={() => loadDetails(v.id)} 
                                                                            className={`cursor-pointer group relative p-4 rounded-[35px] border transition-all active:scale-95 ${v.id === selected.id ? 'border-red-600 bg-red-600/5 shadow-xl' : theme === 'dark' ? 'border-slate-800 bg-slate-900/50 hover:border-slate-600' : 'border-slate-100 bg-white hover:border-slate-200 shadow-sm'}`}
                                                                        >
                                                                            <img src={v.img} className="w-16 h-16 md:w-20 md:h-20 mx-auto group-hover:scale-110 transition-transform" />
                                                                            <p className="text-[10px] font-bold capitalize mt-3 text-center text-slate-500 truncate max-w-[85px] font-kanit">{v.name.replace(/-/g, ' ')}</p>
                                                                            {badge && (
                                                                                <span className={`var-badge ${badge === 'G-MAX' ? 'bg-red-600' : badge === 'MEGA' ? 'bg-blue-600' : 'bg-slate-800'} text-white`}>
                                                                                    {badge}
                                                                                </span>
                                                                            )}
                                                                        </div>
                                                                    );
                                                                })}
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </section>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
