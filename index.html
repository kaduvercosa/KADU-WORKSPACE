<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex Pro - Eduardo Ultimate Edition</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        kanit: ['Kanit', 'sans-serif'],
                        montserrat: ['Montserrat', 'sans-serif'],
                    },
                    screens: {
                        '3xl': '2000px',
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #020617; color: white; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* Grid responsivo que nao buga no PC */
        .pokedex-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            width: 100%;
        }
        @media (min-width: 1024px) {
            .pokedex-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        }

        .pokemon-card { 
            background: #0f172a;
            border: 1px solid #1e293b;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .pokemon-card:hover {
            transform: translateY(-8px);
            border-color: #facc15;
            box-shadow: 0 15px 30px -10px rgba(250, 204, 21, 0.3);
        }

        .modal-overlay { backdrop-filter: blur(20px); background: rgba(0,0,0,0.9); z-index: 100; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .stat-bar { height: 6px; background: #1e293b; border-radius: 3px; }
        .stat-fill { height: 100%; transition: width 1s ease-out; }
        
        .rarity-tag { font-size: 8px; font-weight: 900; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }
        .legendary { background: #facc15; color: #000; }
        .mythical { background: #a855f7; color: #fff; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const TRANSLATIONS = {
            types: {
                fire: 'Fogo', water: 'Agua', grass: 'Planta', bug: 'Inseto', normal: 'Normal', 
                poison: 'Venenoso', electric: 'Eletrico', ground: 'Terra', fairy: 'Fada', 
                fighting: 'Lutador', psychic: 'Psiquico', rock: 'Pedra', ghost: 'Fantasma', 
                ice: 'Gelo', dragon: 'Dragao', steel: 'Aco', flying: 'Voador', dark: 'Sombrio'
            },
            stats: {
                hp: 'Vida', attack: 'Atk', defense: 'Def', 
                'special-attack': 'Atk Esp', 'special-defense': 'Def Esp', speed: 'Veloc'
            }
        };

        const COLORS = {
            fire: 'bg-red-500', water: 'bg-blue-500', grass: 'bg-green-500', 
            bug: 'bg-lime-600', normal: 'bg-slate-400', poison: 'bg-purple-500', 
            electric: 'bg-yellow-400', ground: 'bg-amber-600', fairy: 'bg-pink-400', 
            fighting: 'bg-orange-700', psychic: 'bg-rose-400', rock: 'bg-stone-600', 
            ghost: 'bg-indigo-800', ice: 'bg-cyan-300', dragon: 'bg-violet-600',
            steel: 'bg-gray-500', flying: 'bg-sky-400', dark: 'bg-gray-800'
        };

        function App() {
            const [pokemonList, setPokemonList] = useState([]);
            const [loading, setLoading] = useState(true);
            const [search, setSearch] = useState('');
            const [typeFilter, setTypeFilter] = useState('todos');
            const [rarityFilter, setRarityFilter] = useState('todos');
            const [selected, setSelected] = useState(null);
            const [evoChain, setEvoChain] = useState([]);

            useEffect(() => {
                const fetchBase = async () => {
                    const res = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1025');
                    const data = await res.json();
                    const list = data.results.map((p, i) => ({
                        name: p.name,
                        id: i + 1,
                        img: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${i + 1}.png`
                    }));
                    setPokemonList(list);
                    setLoading(false);
                    loadFullMetadata(list);
                };
                fetchBase();
            }, []);

            const loadFullMetadata = async (list) => {
                for (let i = 0; i < list.length; i += 50) {
                    const batch = list.slice(i, i + 50);
                    const details = await Promise.all(batch.map(async p => {
                        try {
                            const r = await fetch(`https://pokeapi.co/api/v2/pokemon/${p.id}`);
                            const d = await r.json();
                            const sr = await fetch(d.species.url);
                            const sd = await sr.json();
                            return { 
                                ...p, 
                                types: d.types.map(t => t.type.name),
                                rarity: sd.is_mythical ? 'mitico' : sd.is_legendary ? 'lendario' : 'comum'
                            };
                        } catch { return p; }
                    }));
                    setPokemonList(prev => {
                        const copy = [...prev];
                        details.forEach(d => { copy[d.id - 1] = d; });
                        return copy;
                    });
                }
            };

            const loadDetails = async (idOrName) => {
                try {
                    const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${idOrName}`);
                    const data = await res.json();
                    const sRes = await fetch(data.species.url);
                    const sData = await sRes.json();
                    const eRes = await fetch(sData.evolution_chain.url);
                    const eData = await eRes.json();

                    let chain = [];
                    let curr = eData.chain;
                    while (curr) {
                        const name = curr.species.name;
                        const spRes = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${name}`);
                        const spData = await spRes.json();
                        const varieties = await Promise.all(spData.varieties.map(async v => {
                            const vR = await fetch(v.pokemon.url);
                            const vD = await vR.json();
                            return {
                                name: v.pokemon.name,
                                id: vD.id,
                                img: vD.sprites.other['official-artwork'].front_default || vD.sprites.front_default
                            };
                        }));
                        chain.push({ name, varieties });
                        curr = curr.evolves_to[0];
                    }
                    setEvoChain(chain);
                    setSelected({
                        ...data,
                        rarity: sData.is_mythical ? 'mitico' : sData.is_legendary ? 'lendario' : 'comum',
                        desc: sData.flavor_text_entries.find(l => l.language.name === 'en')?.flavor_text.replace(/[\n\f]/g, ' ')
                    });
                } catch (e) { console.error(e); }
            };

            const filtered = useMemo(() => {
                return pokemonList.filter(p => {
                    const matchesSearch = p.name.includes(search.toLowerCase()) || p.id.toString() === search;
                    const matchesType = typeFilter === 'todos' || (p.types && p.types.includes(typeFilter));
                    const matchesRarity = rarityFilter === 'todos' || (p.rarity === rarityFilter);
                    return matchesSearch && matchesType && matchesRarity;
                });
            }, [search, typeFilter, rarityFilter, pokemonList]);

            return (
                <div className="min-h-screen px-4 md:px-8">
                    <header className="sticky top-0 z-50 bg-slate-950/90 border-b border-slate-800 py-6 backdrop-blur-md">
                        <div className="max-w-[1800px] mx-auto flex flex-col xl:flex-row gap-6 items-center">
                            <h1 className="text-3xl font-kanit font-bold text-yellow-400 shrink-0">POKEDEX PRO</h1>
                            <div className="flex flex-wrap w-full gap-3">
                                <input 
                                    type="text" 
                                    placeholder="Buscar por Nome ou ID..."
                                    className="flex-1 min-w-[200px] bg-slate-900 border border-slate-700 rounded-2xl p-4 text-sm outline-none focus:border-yellow-400"
                                    onChange={e => setSearch(e.target.value)}
                                />
                                <select className="bg-slate-900 border border-slate-700 rounded-2xl p-4 text-sm outline-none font-bold" onChange={e => setTypeFilter(e.target.value)}>
                                    <option value="todos">Todos Tipos</option>
                                    {Object.keys(TRANSLATIONS.types).map(k => <option key={k} value={k}>{TRANSLATIONS.types[k]}</option>)}
                                </select>
                                <select className="bg-slate-900 border border-slate-700 rounded-2xl p-4 text-sm outline-none font-bold text-yellow-400" onChange={e => setRarityFilter(e.target.value)}>
                                    <option value="todos">Todas Raridades</option>
                                    <option value="comum">Comum</option>
                                    <option value="lendario">Lendario</option>
                                    <option value="mitico">Mitico</option>
                                </select>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-[1800px] mx-auto mt-8">
                        <div className="pokedex-grid">
                            {filtered.map(p => (
                                <div key={p.id} onClick={() => loadDetails(p.id)} className="pokemon-card rounded-[32px] p-5 flex flex-col items-center cursor-pointer">
                                    <div className="w-full flex justify-between items-start mb-2">
                                        <span className="text-slate-500 font-bold text-[10px]">#{p.id}</span>
                                        {p.rarity && p.rarity !== 'comum' && (
                                            <span className={`rarity-tag ${p.rarity === 'lendario' ? 'legendary' : 'mythical'}`}>{p.rarity}</span>
                                        )}
                                    </div>
                                    <img src={p.img} className="w-32 h-32 object-contain my-2 drop-shadow-xl" loading="lazy" />
                                    <h2 className="text-sm font-kanit font-bold capitalize text-white mb-3">{p.name}</h2>
                                    <div className="flex flex-wrap justify-center gap-1">
                                        {p.types?.map(t => (
                                            <span key={t} className={`${COLORS[t]} px-2 py-0.5 rounded-lg text-[8px] font-bold uppercase`}>
                                                {TRANSLATIONS.types[t]}
                                            </span>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {selected && (
                        <div className="fixed inset-0 modal-overlay flex items-end md:items-center justify-center z-[100] p-0 md:p-4" onClick={() => setSelected(null)}>
                            <div className="bg-slate-950 w-full max-w-6xl max-h-[95vh] md:rounded-[48px] rounded-t-[40px] overflow-y-auto border-t md:border border-slate-800 shadow-2xl relative" onClick={e => e.stopPropagation()}>
                                <div className="sticky top-0 bg-slate-950/95 p-6 border-b border-slate-800 flex justify-between items-center z-50">
                                    <button onClick={() => setSelected(null)} className="text-yellow-400 font-bold text-xs">← VOLTAR</button>
                                    <div className="flex gap-2">
                                        <span className={`rarity-tag ${selected.rarity === 'lendario' ? 'legendary' : selected.rarity === 'mitico' ? 'mythical' : 'bg-slate-800'}`}>
                                            {selected.rarity}
                                        </span>
                                    </div>
                                </div>

                                <div className="p-6 md:p-12 flex flex-col lg:flex-row gap-12">
                                    <div className="w-full lg:w-1/3 text-center">
                                        <img src={selected.sprites.other['official-artwork'].front_default} className="w-64 h-64 mx-auto drop-shadow-2xl" />
                                        <h2 className="text-5xl font-kanit font-bold capitalize mt-6">{selected.name}</h2>
                                        <div className="flex justify-center gap-2 mt-4">
                                            {selected.types.map(t => <span key={t.type.name} className={`${COLORS[t.type.name]} px-4 py-1 rounded-xl text-[10px] font-bold uppercase`}>{TRANSLATIONS.types[t.type.name]}</span>)}
                                        </div>
                                    </div>

                                    <div className="flex-1">
                                        <p className="text-slate-400 text-sm italic mb-10 leading-relaxed">"{selected.desc}"</p>
                                        
                                        <h3 className="text-yellow-400 font-kanit font-bold text-[10px] tracking-widest mb-6 uppercase">Status Base</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-6 mb-12">
                                            {selected.stats.map(s => (
                                                <div key={s.stat.name}>
                                                    <div className="flex justify-between text-[10px] font-bold uppercase mb-2">
                                                        <span className="text-slate-500">{TRANSLATIONS.stats[s.stat.name] || s.stat.name}</span>
                                                        <span>{s.base_stat}</span>
                                                    </div>
                                                    <div className="h-1.5 bg-slate-800 rounded-full overflow-hidden">
                                                        <div className={`stat-fill ${COLORS[selected.types[0].type.name]}`} style={{ width: `${(s.base_stat / 255) * 100}%` }}></div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>

                                        <h3 className="text-yellow-400 font-kanit font-bold text-[10px] tracking-widest mb-8 uppercase text-center md:text-left">Evolucoes e Variacoes</h3>
                                        <div className="space-y-12">
                                            {evoChain.map((step, i) => (
                                                <div key={step.name} className="flex flex-col gap-4">
                                                    <div className="flex items-center gap-4">
                                                        <span className="text-[10px] font-bold text-slate-600 uppercase">Estagio {i + 1}</span>
                                                        <div className="h-px bg-slate-800 flex-1"></div>
                                                    </div>
                                                    <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-4">
                                                        {step.varieties.map(v => (
                                                            <div key={v.id} onClick={() => loadDetails(v.id)} className={`cursor-pointer group p-3 rounded-3xl border transition-all ${v.id === selected.id ? 'border-yellow-400 bg-yellow-400/10 shadow-lg shadow-yellow-400/10' : 'border-slate-800 hover:border-slate-600 bg-slate-900/50'}`}>
                                                                <img src={v.img} className="w-16 h-16 mx-auto group-hover:scale-110 transition-transform" />
                                                                <p className="text-[8px] font-bold capitalize mt-2 text-center text-slate-400 truncate">{v.name.replace(/-/g, ' ')}</p>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
