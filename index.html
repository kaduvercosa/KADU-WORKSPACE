<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex Pro</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        kanit: ['Kanit', 'sans-serif'],
                        montserrat: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: 'Montserrat', sans-serif;
        }
        .pokemon-card {
            transition: all 0.3s ease;
        }
        .pokemon-card:hover {
            transform: translateY(-8px);
            border-color: #facc15;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const colors = {
            fire: 'bg-red-500',
            grass: 'bg-green-500',
            water: 'bg-blue-500',
            bug: 'bg-lime-600',
            normal: 'bg-slate-400',
            poison: 'bg-purple-500',
            electric: 'bg-yellow-400',
            ground: 'bg-amber-600',
            fairy: 'bg-pink-400',
            fighting: 'bg-orange-700',
            psychic: 'bg-rose-400',
            rock: 'bg-stone-600',
            ghost: 'bg-indigo-800',
            ice: 'bg-cyan-300',
            dragon: 'bg-violet-600',
        };

        function App() {
            const [pokemon, setPokemon] = useState([]);
            const [search, setSearch] = useState('');
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const fetchData = async () => {
                    try {
                        const res = await fetch('https://pokeapi.co/api/v2/pokemon?limit=151');
                        const data = await res.json();
                        
                        const details = await Promise.all(
                            data.results.map(async (p) => {
                                const resDetails = await fetch(p.url);
                                return await resDetails.json();
                            })
                        );
                        setPokemon(details);
                        setLoading(false);
                    } catch (error) {
                        console.error("Erro ao buscar dados:", error);
                    }
                };
                fetchData();
            }, []);

            const filteredPokemon = pokemon.filter(p => 
                p.name.toLowerCase().includes(search.toLowerCase())
            );

            return (
                <div className="min-h-screen p-4 md:p-10">
                    <header className="max-w-6xl mx-auto text-center mb-10">
                        <h1 className="text-5xl font-kanit font-bold text-yellow-400 mb-4 drop-shadow-lg">
                            Pokedex Pro
                        </h1>
                        <input 
                            type="text" 
                            placeholder="Pesquisar pokemon..."
                            className="w-full max-w-md p-3 rounded-full bg-slate-800 border-2 border-slate-700 focus:border-yellow-400 outline-none transition-all text-center text-white"
                            onChange={(e) => setSearch(e.target.value)}
                        />
                    </header>

                    {loading ? (
                        <div className="text-center text-2xl font-kanit animate-pulse">Carregando dados...</div>
                    ) : (
                        <main className="max-w-6xl mx-auto grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                            {filteredPokemon.map(p => (
                                <div 
                                    key={p.id} 
                                    className="pokemon-card relative bg-slate-800 rounded-3xl p-5 border border-slate-700 shadow-xl overflow-hidden group"
                                >
                                    <span className="absolute top-4 left-4 text-slate-500 font-bold">#{String(p.id).padStart(3, '0')}</span>
                                    
                                    <img 
                                        src={p.sprites.other['official-artwork'].front_default} 
                                        alt={p.name} 
                                        className="w-40 h-40 mx-auto drop-shadow-2xl group-hover:scale-110 transition-transform"
                                    />
                                    
                                    <h2 className="text-2xl font-kanit font-bold capitalize text-center mt-4 mb-2">
                                        {p.name}
                                    </h2>

                                    <div className="flex justify-center gap-2">
                                        {p.types.map(t => (
                                            <span 
                                                key={t.type.name}
                                                className={`px-3 py-1 rounded-full text-xs font-bold uppercase text-white ${colors[t.type.name] || 'bg-slate-500'}`}
                                            >
                                                {t.type.name}
                                            </span>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </main>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
