<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MasterDex</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --type-color: #4A90E2;
      --type-dark: #1a1a2e;
      --glass-bg: rgba(255, 255, 255, 0.5);
      --glass-border: rgba(255, 255, 255, 0.7);
      --text-main: #1a1a1a;
      --header-bg: rgba(255, 255, 255, 0.15);
      --card-inner: rgba(255, 255, 255, 0.3);
    }

    [data-theme="dark"] {
        --glass-bg: rgba(30, 30, 45, 0.7);
        --glass-border: rgba(255, 255, 255, 0.1);
        --text-main: #ffffff;
        --header-bg: rgba(0, 0, 0, 0.3);
        --card-inner: rgba(255, 255, 255, 0.08);
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --glass-bg: rgba(30, 30, 45, 0.7);
        --glass-border: rgba(255, 255, 255, 0.1);
        --text-main: #ffffff;
        --header-bg: rgba(0, 0, 0, 0.3);
        --card-inner: rgba(255, 255, 255, 0.08);
      }
    }

    @keyframes fadeInGrid { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    body { margin: 0; padding: 0; background: linear-gradient(135deg, var(--type-color) 0%, var(--type-dark) 100%); background-attachment: fixed; color: var(--text-main); font-family: 'Poppins', sans-serif; min-height: 100vh; transition: background 0.8s ease, color 0.3s ease; overflow-x: hidden; }

    #theme-toggle { position: fixed; bottom: 30px; right: 30px; width: 55px; height: 55px; border-radius: 50%; background: var(--glass-bg); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); color: var(--text-main); font-size: 20px; cursor: pointer; z-index: 2000; display: flex; justify-content: center; align-items: center; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }

    header { width: 100%; padding: 25px 20px; text-align: center; box-sizing: border-box; background: var(--header-bg); backdrop-filter: blur(15px); border-bottom: 1px solid var(--glass-border); z-index: 100; position: fixed; top: 0; transition: 0.4s ease; }
    header.hide { transform: translateY(-100%); }
    h1 { font-family: 'Montserrat', sans-serif; font-size: 28px; font-weight: 900; letter-spacing: 2px; color: #fff; text-shadow: 0 4px 15px rgba(0,0,0,0.2); margin: 0 0 10px 0; }
    
    .search-container { width: 90%; max-width: 600px; margin: 0 auto; display: flex; gap: 10px; }
    #search-input { flex: 1; padding: 14px 20px; border-radius: 18px; border: 1px solid var(--glass-border); background: var(--glass-bg); color: var(--text-main); font-size: 15px; outline: none; }
    #filter-btn { padding: 0 20px; border-radius: 18px; border: 1px solid var(--glass-border); background: var(--glass-bg); color: var(--text-main); cursor: pointer; font-weight: 700; font-size: 13px; transition: 0.3s; }
    #filter-btn.active { background: var(--type-color); color: white; }

    #filter-bar { max-height: 0; overflow: hidden; transition: all 0.3s ease; display: flex; flex-direction: column; gap: 12px; width: 90%; max-width: 600px; margin: 0 auto; }
    #filter-bar.active { max-height: 500px; padding-top: 15px; padding-bottom: 10px; }
    
    .filter-label { font-size: 10px; font-weight: 800; opacity: 0.6; text-transform: uppercase; margin-bottom: 5px; text-align: center; display: block; width: 100%; }
    .filter-group { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 10px; }
    
    .filter-opt { padding: 6px 12px; border-radius: 10px; border: 1px solid var(--glass-border); background: var(--glass-bg); color: var(--text-main); font-size: 10px; font-weight: 700; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
    .filter-opt.selected { background: var(--type-color); color: white; border-color: transparent; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

    #pokedex-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 15px; width: 92%; max-width: 1200px; margin: 0 auto; padding: 180px 0 50px 0; transition: padding 0.3s; }
    header.expanded + #pokedex-grid { padding-top: 420px; }

    .grid-card { background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 25px; padding: 20px 10px; text-align: center; cursor: pointer; transition: 0.3s ease; animation: fadeInGrid 0.4s ease backwards; }
    .grid-card:hover { transform: translateY(-5px); }
    .grid-card img { width: 90px; height: 90px; object-fit: contain; }
    .grid-id { font-size: 10px; font-weight: 800; opacity: 0.5; margin-top: 10px; }
    .grid-name { font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 800; text-transform: capitalize; margin: 4px 0; }
    .grid-rarity { font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; }

    #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(15px); z-index: 3000; display: none; justify-content: center; align-items: flex-start; overflow-y: auto; padding: 20px; box-sizing: border-box; }
    #modal-overlay.active { display: flex; }
    #modal-content { background: var(--glass-bg); backdrop-filter: blur(40px); border: 1px solid var(--glass-border); border-radius: 40px; padding: 35px; width: 100%; max-width: 800px; margin: auto; position: relative; color: var(--text-main); }
    .close-btn { position: absolute; top: 20px; right: 20px; width: 40px; height: 40px; border-radius: 50%; background: var(--card-inner); border: 1px solid var(--glass-border); color: var(--text-main); font-size: 20px; font-weight: bold; cursor: pointer; }

    .modal-layout { display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
    #poke-image { width: 220px; height: 220px; object-fit: contain; animation: float 4s ease-in-out infinite; }
    #poke-name { font-family: 'Montserrat', sans-serif; font-size: 32px; font-weight: 900; text-transform: capitalize; }
    #poke-desc { font-style: italic; background: var(--card-inner); padding: 20px; border-radius: 18px; border-left: 5px solid var(--type-color); font-size: 14px; line-height: 1.5; width: 100%; box-sizing: border-box; }

    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin: 10px 0; }
    .info-item { display: flex; justify-content: space-between; padding: 12px 15px; background: var(--card-inner); border-radius: 15px; border: 1px solid var(--glass-border); }
    .info-label { font-size: 10px; font-weight: 800; opacity: 0.5; text-transform: uppercase; }
    .info-value { font-size: 14px; font-weight: 700; }

    #poke-stats-box { width: 100%; background: var(--card-inner); padding: 25px; border-radius: 25px; box-sizing: border-box; }
    .stat-row { display: flex; align-items: center; margin-bottom: 10px; }
    .stat-name { width: 80px; font-size: 9px; font-weight: 900; opacity: 0.5; text-transform: uppercase; }
    .stat-bar-bg { flex: 1; background: rgba(150,150,150,0.2); height: 8px; border-radius: 4px; margin: 0 12px; overflow: hidden; }
    .stat-bar-fill { height: 100%; background-color: var(--type-color); width: 0; transition: width 1s ease; }
    .stat-value { width: 30px; font-weight: 800; text-align: right; font-size: 12px; }

    .evo-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; width: 100%; margin-top: 15px; }
    .evo-card { background: var(--card-inner); padding: 12px; border-radius: 18px; text-align: center; width: 90px; cursor: pointer; transition: 0.3s; border: 1px solid transparent; }
    .evo-card:hover { border-color: var(--type-color); transform: scale(1.05); }
    .evo-card img { width: 60px; height: 60px; }

    .loader { border: 4px solid rgba(150,150,150,0.1); border-top: 4px solid var(--text-main); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 100px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    @media (min-width: 800px) {
      .modal-layout { flex-direction: row; align-items: flex-start; gap: 40px; }
      #poke-image { width: 280px; height: 280px; }
      .info-grid { grid-template-columns: 1fr 1fr 1fr; }
      header.expanded + #pokedex-grid { padding-top: 320px; }
    }
  </style>
</head>
<body>
  <button id="theme-toggle" onclick="toggleTheme()">🌓</button>
  <header id="main-header">
    <h1>MASTERDEX</h1>
    <div class="search-container">
        <input type="text" id="search-input" placeholder="Buscar Pokémon...">
        <button id="filter-btn" onclick="toggleFilters()">FILTROS</button>
    </div>
    <div id="filter-bar">
        <span class="filter-label">Filtrar por Tipo</span>
        <div class="filter-group" id="type-filters"></div>
        <span class="filter-label">Filtrar por Raridade</span>
        <div class="filter-group">
            <div class="filter-opt" onclick="setRarityFilter('legendary')" id="rar-legendary">Lendários</div>
            <div class="filter-opt" onclick="setRarityFilter('mythical')" id="rar-mythical">Míticos</div>
        </div>
    </div>
  </header>

  <div id="pokedex-grid"></div>
  <div class="loader" id="main-loader"></div>

  <div id="modal-overlay" onclick="if(event.target.id==='modal-overlay') forceCloseModal()">
    <div id="modal-content">
      <button class="close-btn" onclick="forceCloseModal()">×</button>
      <div class="modal-layout">
        <div style="text-align:center">
          <img id="poke-image" src="">
          <div id="poke-id-modal" style="font-weight:800; opacity:0.5; margin-top:10px"></div>
        </div>
        <div style="flex:1; width:100%">
          <div id="poke-name"></div>
          <div id="poke-types" style="display:flex; justify-content:center; gap:10px; margin:15px 0"></div>
          <div id="poke-desc"></div>
          <div class="info-grid">
            <div class="info-item"><span class="info-label">Altura</span><span class="info-value" id="poke-height"></span></div>
            <div class="info-item"><span class="info-label">Peso</span><span class="info-value" id="poke-weight"></span></div>
            <div class="info-item"><span class="info-label">Raridade</span><span class="info-value" id="poke-rarity"></span></div>
          </div>
          <div id="poke-stats-box">
             <div id="stats-list"></div>
          </div>
          <div id="evolutions"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const typeMap = { normal: 'Normal', fire: 'Fogo', water: 'Água', electric: 'Elétrico', grass: 'Grama', ice: 'Gelo', fighting: 'Lutador', poison: 'Venenoso', ground: 'Terrestre', flying: 'Voador', psychic: 'Psíquico', bug: 'Inseto', rock: 'Pedra', ghost: 'Fantasma', dragon: 'Dragão', dark: 'Sombrio', steel: 'Aço', fairy: 'Fada' };
    const typeColors = { normal: '#9FA19F', fire: '#F45C19', water: '#3A8DE9', electric: '#F2D335', grass: '#53BA4E', ice: '#6CD4D0', fighting: '#CE426B', poison: '#AA6BC8', ground: '#D97944', flying: '#91A8E1', psychic: '#FB8886', bug: '#90C12B', rock: '#C6B78B', ghost: '#5269AD', dragon: '#0B6DC4', dark: '#5A5465', steel: '#5A8FA3', fairy: '#EC8FE6' };
    const statMap = { 'hp': 'HP', 'attack': 'ATAQUE', 'defense': 'DEFESA', 'special-attack': 'ATQ. ESP', 'special-defense': 'DEF. ESP', 'speed': 'VELOCIDADE' };
    const legendaries = [144,145,146,150,243,244,245,249,250,377,378,379,380,381,382,383,384,480,481,482,483,484,485,486,487,488,638,639,640,641,642,643,644,645,646,716,717,718,772,773,785,786,787,788,789,790,791,792,800,888,889,890,891,892,894,895,896,897,898];
    const mythicals = [151,251,385,386,489,490,491,492,493,494,647,648,649,719,720,721,801,802,807,808,809,893];

    let allPokemon = [];
    let selectedType = null;
    let selectedRarity = null;
    let lastScrollTop = 0;

    function toggleTheme() {
      const html = document.documentElement;
      const target = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
      html.setAttribute("data-theme", target);
      localStorage.setItem("pokedex-theme", target);
    }
    if(localStorage.getItem("pokedex-theme")) document.documentElement.setAttribute("data-theme", localStorage.getItem("pokedex-theme"));

    function toggleFilters() {
        document.getElementById("filter-bar").classList.toggle("active");
        document.getElementById("main-header").classList.toggle("expanded");
        document.getElementById("filter-btn").classList.toggle("active");
    }

    async function init() {
      const res = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1025');
      const data = await res.json();
      allPokemon = data.results.map(p => ({ ...p, id: parseInt(p.url.split('/').filter(Boolean).pop()) }));
      
      // Render tipos
      const typeFilters = document.getElementById("type-filters");
      Object.keys(typeMap).forEach(t => {
          typeFilters.innerHTML += `<div class="filter-opt" onclick="setTypeFilter('${t}')" id="type-${t}">${typeMap[t]}</div>`;
      });

      renderGrid(allPokemon);
      document.getElementById('main-loader').style.display='none';
    }

    function setTypeFilter(type) {
        if (selectedType === type) selectedType = null; // Desmarca
        else selectedType = type;
        
        document.querySelectorAll("#type-filters .filter-opt").forEach(el => el.classList.remove("selected"));
        if(selectedType) document.getElementById(`type-${type}`).classList.add("selected");
        applyFilters();
    }

    function setRarityFilter(rarity) {
        if (selectedRarity === rarity) selectedRarity = null; // Desmarca
        else selectedRarity = rarity;

        document.querySelectorAll(".filter-opt[id^='rar-']").forEach(el => el.classList.remove("selected"));
        if(selectedRarity) document.getElementById(`rar-${rarity}`).classList.add("selected");
        applyFilters();
    }

    async function applyFilters() {
        const search = document.getElementById('search-input').value.toLowerCase();
        
        let filtered = allPokemon.filter(p => {
            const matchesSearch = p.name.includes(search) || p.id.toString().includes(search);
            let matchesRarity = true;
            if(selectedRarity === 'legendary') matchesRarity = legendaries.includes(p.id);
            if(selectedRarity === 'mythical') matchesRarity = mythicals.includes(p.id);
            return matchesSearch && matchesRarity;
        });

        if (selectedType) {
            document.getElementById('main-loader').style.display = 'block';
            const typeRes = await fetch(`https://pokeapi.co/api/v2/type/${selectedType}`);
            const typeData = await typeRes.json();
            const validIds = typeData.pokemon.map(p => parseInt(p.pokemon.url.split('/').filter(Boolean).pop()));
            filtered = filtered.filter(p => validIds.includes(p.id));
            document.getElementById('main-loader').style.display = 'none';
        }

        renderGrid(filtered);
    }

    function getRarityInfo(id) {
        if (legendaries.includes(id)) return { label: 'Lendário', color: '#FFD700' };
        if (mythicals.includes(id)) return { label: 'Mítico', color: '#D470FF' };
        return { label: 'Comum', color: '' };
    }

    function renderGrid(list) {
      const grid = document.getElementById('pokedex-grid'); grid.innerHTML = '';
      const frag = document.createDocumentFragment();
      list.forEach(p => {
        const rarity = getRarityInfo(p.id);
        const card = document.createElement('div'); card.className = 'grid-card';
        card.onclick = () => openModal(p.id);
        card.innerHTML = `<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${p.id}.png" loading="lazy">
            <div class="grid-id">#${p.id.toString().padStart(3,'0')}</div>
            <div class="grid-name">${p.name.replace(/-/g, ' ')}</div>
            <div class="grid-rarity" style="color:${rarity.color}">${rarity.label}</div>`;
        frag.appendChild(card);
      });
      grid.appendChild(frag);
    }

    document.getElementById('search-input').oninput = applyFilters;

    async function openModal(id) {
      const overlay = document.getElementById('modal-overlay');
      overlay.classList.add('active');
      document.body.style.overflow = 'hidden';

      try {
        const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
        const data = await res.json();
        document.documentElement.style.setProperty('--type-color', typeColors[data.types[0].type.name]);

        document.getElementById('poke-image').src = data.sprites.other['official-artwork'].front_default;
        document.getElementById('poke-name').innerText = data.name.replace(/-/g, ' ');
        document.getElementById('poke-id-modal').innerText = '#' + id.toString().padStart(3, '0');
        document.getElementById('poke-height').innerText = (data.height/10).toFixed(1) + ' m';
        document.getElementById('poke-weight').innerText = (data.weight/10).toFixed(1) + ' kg';

        const typesDiv = document.getElementById('poke-types'); typesDiv.innerHTML = '';
        data.types.forEach(t => {
          typesDiv.innerHTML += `<span style="background:${typeColors[t.type.name]}; color:#fff; padding:6px 15px; border-radius:15px; font-weight:800; font-size:11px; text-transform:uppercase">${typeMap[t.type.name]}</span>`;
        });

        const statsList = document.getElementById('stats-list'); statsList.innerHTML = '';
        data.stats.forEach(s => {
          const pct = Math.min((s.base_stat / 200) * 100, 100);
          statsList.innerHTML += `<div class="stat-row"><span class="stat-name">${statMap[s.stat.name] || s.stat.name}</span><div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${pct}%"></div></div><span class="stat-value">${s.base_stat}</span></div>`;
        });

        const spec = await (await fetch(data.species.url)).json();
        const flavor = spec.flavor_text_entries.find(f => f.language.name === 'pt-BR' || f.language.name === 'pt') || spec.flavor_text_entries.find(f => f.language.name === 'en');
        let synopsis = flavor ? flavor.flavor_text.replace(/[\f\n\r]/g, ' ') : "...";
        if(flavor && flavor.language.name === 'en') {
          try { const tr = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=pt&dt=t&q=${encodeURIComponent(synopsis)}`); const trd = await tr.json(); synopsis = trd[0].map(x => x[0]).join(''); } catch(e) {}
        }
        document.getElementById('poke-desc').innerText = synopsis;
        document.getElementById('poke-rarity').innerText = spec.is_legendary ? 'Lendário' : (spec.is_mythical ? 'Mítico' : 'Comum');

        fetchEvolutions(spec.evolution_chain.url);
        overlay.scrollTop = 0;
      } catch (e) { forceCloseModal(); }
    }

    async function fetchEvolutions(url) {
      const d = await (await fetch(url)).json(); let evos = [];
      function getE(n) { evos.push({ name: n.species.name, id: parseInt(n.species.url.split('/').filter(Boolean).pop()) }); n.evolves_to.forEach(getE); }
      getE(d.chain);
      const div = document.getElementById('evolutions'); div.innerHTML = evos.length > 1 ? '<h3 style="text-align:center; font-size:11px; opacity:0.5; margin-top:20px">EVOLUÇÕES</h3><div class="evo-container"></div>' : '';
      if(evos.length > 1) {
        const container = div.querySelector('.evo-container');
        evos.forEach(e => {
          const c = document.createElement('div'); c.className = 'evo-card'; 
          c.onclick = (ev) => { ev.stopPropagation(); openModal(e.id); };
          c.innerHTML = `<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${e.id}.png"><div style="font-size:10px; font-weight:800; text-transform:capitalize">${e.name}</div>`;
          container.appendChild(c);
        });
      }
    }

    function forceCloseModal() { document.getElementById('modal-overlay').classList.remove('active'); document.body.style.overflow = 'auto'; }
    init();
  </script>
</body>
</html>
