<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pokédex Completa</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* VARIÁVEIS E ANIMAÇÕES */
    :root { --type-color: #2a2a2a; --type-dark: #121212; }
    @keyframes float { 0% { transform: translateY(0px); filter: drop-shadow(0 15px 25px rgba(0,0,0,0.3)); } 50% { transform: translateY(-10px); filter: drop-shadow(0 20px 30px rgba(0,0,0,0.2)); } 100% { transform: translateY(0px); filter: drop-shadow(0 15px 25px rgba(0,0,0,0.3)); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes fadeInGrid { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    
    /* ESTILO GERAL (Fundo Padrão Escuro) */
    body { margin: 0; padding: 0; background: linear-gradient(135deg, var(--type-color) 0%, var(--type-dark) 100%); background-attachment: fixed; color: #ffffff; font-family: 'Poppins', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; transition: background 0.5s ease; }
    
    /* CABEÇALHO E BUSCA */
    header { width: 100%; padding: 40px 20px 20px 20px; text-align: center; box-sizing: border-box; background: rgba(0,0,0,0.2); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 10; position: sticky; top: 0; }
    h1 { font-family: 'Montserrat', sans-serif; font-size: 36px; font-weight: 900; margin: 0 0 20px 0; letter-spacing: 2px; text-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    #search-input { width: 90%; max-width: 600px; padding: 18px 25px; border-radius: 25px; border: 2px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); color: white; font-family: 'Poppins', sans-serif; font-size: 16px; outline: none; transition: all 0.3s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    #search-input:focus { border-color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.2); }

    /* GRADE DE POKÉMON (O Mosaico) */
    #pokedex-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; width: 90%; max-width: 1200px; padding: 40px 0; }
    .grid-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 25px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 10px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center; animation: fadeInGrid 0.5s ease backwards; }
    .grid-card:hover { transform: translateY(-8px) scale(1.03); background: rgba(255, 255, 255, 0.2); box-shadow: 0 15px 30px rgba(0,0,0,0.2); border-color: rgba(255,255,255,0.4); }
    .grid-card:active { transform: scale(0.95); }
    .grid-card img { width: 100px; height: 100px; object-fit: contain; filter: drop-shadow(0 8px 10px rgba(0,0,0,0.3)); transition: transform 0.3s; }
    .grid-card:hover img { transform: scale(1.1); }
    .grid-id { background: rgba(0,0,0,0.3); padding: 4px 10px; border-radius: 10px; font-size: 12px; font-weight: 800; color: #ccc; margin-top: 15px; margin-bottom: 5px; }
    .grid-name { font-family: 'Montserrat', sans-serif; font-size: 16px; font-weight: 800; text-transform: capitalize; color: #fff; margin: 0; }

    /* MODAL (A Janela Flutuante de Detalhes) */
    #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px); z-index: 100; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; overflow-y: auto; padding: 20px; box-sizing: border-box; }
    #modal-overlay.active { opacity: 1; pointer-events: auto; }
    
    #modal-content { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 40px; padding: 40px; width: 100%; max-width: 900px; box-shadow: 0 30px 60px rgba(0,0,0,0.4); position: relative; display: flex; flex-direction: column; align-items: center; margin: auto; transform: translateY(20px) scale(0.95); transition: all 0.3s ease; }
    #modal-overlay.active #modal-content { transform: translateY(0) scale(1); }
    
    /* Botão Fechar Modal */
    .close-btn { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.3); color: white; border: 2px solid rgba(255,255,255,0.3); width: 40px; height: 40px; border-radius: 20px; font-size: 20px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s; z-index: 110; }
    .close-btn:hover { background: rgba(255,255,255,0.3); transform: scale(1.1); }
    
    /* Layout Interno do Modal (Igual ao código anterior) */
    .modal-layout { display: flex; flex-direction: column; align-items: center; width: 100%; gap: 20px; }
    .card-content { width: 100%; display: flex; flex-direction: column; align-items: center; text-align: center; }
    #poke-image { width: 250px; height: 250px; object-fit: contain; margin-top: -30px; z-index: 10; animation: float 4s ease-in-out infinite; }
    #poke-name { font-family: 'Montserrat', sans-serif; font-size: 40px; font-weight: 900; text-transform: capitalize; margin: 0; letter-spacing: -1px; line-height: 1.1; }
    #poke-id { font-family: 'Montserrat', sans-serif; background: rgba(0,0,0,0.2); padding: 5px 15px; border-radius: 15px; color: #fff; font-weight: 800; font-size: 16px; margin-bottom: 20px; letter-spacing: 2px; margin-top: 10px; }
    #poke-types { margin-bottom: 25px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .type-badge { padding: 8px 18px; border-radius: 25px; font-weight: 800; font-size: 13px; text-transform: uppercase; border: 2px solid rgba(255,255,255,0.5); box-shadow: 0 8px 15px rgba(0,0,0,0.15); letter-spacing: 1px; }
    #poke-desc { font-style: italic; font-weight: 500; font-size: 14px; line-height: 1.5; color: #fff; background: rgba(0,0,0,0.15); padding: 18px 22px; border-radius: 20px; border-left: 5px solid rgba(255,255,255,0.6); margin-bottom: 20px; width: 100%; box-sizing: border-box; text-align: left; }
    
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; background: rgba(255,255,255,0.15); padding: 22px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.3); box-sizing: border-box; margin-bottom: 20px; }
    .info-item { display: flex; flex-direction: column; }
    .info-label { font-size: 11px; color: rgba(255,255,255,0.8); text-transform: uppercase; font-weight: 700; margin-bottom: 4px; }
    .info-value { font-size: 15px; font-weight: 700; text-transform: capitalize; color: #fff; }
    
    #poke-stats { width: 100%; background: rgba(255,255,255,0.15); padding: 22px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.3); box-sizing: border-box; margin-bottom: 20px;}
    #poke-stats h3 { margin: 0 0 15px 0; font-size: 15px; text-align: center; color: #fff; text-transform: uppercase; font-weight: 800; }
    .stat-row { display: flex; align-items: center; margin-bottom: 10px; font-size: 13px; }
    .stat-name { width: 80px; font-weight: 800; color: rgba(255,255,255,0.9); text-transform: uppercase; font-size: 11px; }
    .stat-bar-bg { flex: 1; background: rgba(0,0,0,0.15); height: 10px; border-radius: 5px; margin: 0 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); }
    .stat-bar-fill { height: 100%; border-radius: 5px; width: 0; transition: width 0.4s ease-out; }
    .stat-value { width: 35px; text-align: right; font-weight: 900; font-size: 14px; color: #fff; }
    
    #evolutions { width: 100%; }
    .evo-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; margin-top: 15px; }
    .evo-card { background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 20px; padding: 15px; text-align: center; cursor: pointer; width: 90px; transition: 0.15s; }
    .evo-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.3); }
    .evo-card img { width: 70px; height: 70px; object-fit: contain; }
    .evo-name { font-size: 12px; text-transform: capitalize; margin-top: 8px; font-weight: 800; color: #fff; }

    /* Estilo de Carregamento */
    .loader { border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid #fff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 50px auto; display: none; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* Responsividade iPad */
    @media (min-width: 800px) {
      .modal-layout { flex-direction: row; align-items: stretch; gap: 40px; }
      .card-content { flex: 1; align-items: flex-start; text-align: left; }
      #poke-image { width: 320px; height: 320px; margin-top: 0; align-self: center; }
      #poke-name { font-size: 50px; }
      #poke-types { justify-content: flex-start; }
      .info-grid { grid-template-columns: 1fr 1fr 1fr; }
      .info-item[style] { grid-column: auto !important; }
      #poke-stats h3 { text-align: left; }
      #pokedex-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
    }
  </style>
</head>
<body>

    <h1>POKÉDEX</h1>
    <input type="text" id="search-input" placeholder="Pesquise por nome ou número...">
  </header>

  <div id="pokedex-grid"></div>
  <div class="loader" id="main-loader" style="display: block;"></div>

      <button class="close-btn" onclick="forceCloseModal()">×</button>
